<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="버틸까 — 상권 쇠퇴 분석 모바일 웹앱" />

    <!-- 폰트: Pretendard Variable 다이나믹 서브셋 (한글은 화면에 쓰는 글자만 로드) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />

    <!-- 모바일 웹앱 / 홈 화면 추가.
         아이콘·매니페스트·theme-color·iOS 스플래시 <link> 는 vite-plugin-pwa 가 빌드 시 자동 주입한다.
         (소스: public/app-icon.svg → pwa-assets.config.ts) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="버틸까" />

    <title>버틸까</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
