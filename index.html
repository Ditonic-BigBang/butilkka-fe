<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="버틸까 — 상권 쇠퇴 분석 모바일 웹앱" />

    <!-- 폰트: Pretendard Variable 다이나믹 서브셋 (한글은 화면에 쓰는 글자만 로드) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />

    <!-- 모바일 웹앱 / 홈 화면 추가.
         아이콘·매니페스트·theme-color·iOS 스플래시 <link> 는 vite-plugin-pwa 가 빌드 시 자동 주입한다.
         (소스: public/app-icon.svg → pwa-assets.config.ts) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: 상태바 투명 → 앱이 노치 뒤까지 확장. 노치 영역은 각 화면 프레임 배경색
         (MobileLayout의 pt-safe-top)이 채워서 배경과 이어져 보인다. viewport-fit=cover 필수(위에 있음).
         주의: 이 모드는 상태바 글자(시계·배터리)가 흰색 고정이라 밝은 배경에선 대비가 약할 수 있다. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="버틸까" />

    <!-- 소셜 링크 미리보기 (카카오톡·페북 등은 OG 태그를 읽음. og:image/url 은 절대 URL 필수) -->
    <link rel="canonical" href="https://butilkka.site/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="버틸까" />
    <meta property="og:title" content="버틸까 — 상권 쇠퇴, 미리 버틸지 판단하세요" />
    <meta
      property="og:description"
      content="유동인구·공실·폐업률로 내 가게 상권 등급을 진단하는 모바일 웹앱"
    />
    <meta property="og:url" content="https://butilkka.site/" />
    <meta property="og:image" content="https://butilkka.site/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="버틸까" />
    <meta
      name="twitter:description"
      content="유동인구·공실·폐업률로 내 가게 상권 등급을 진단하는 모바일 웹앱"
    />
    <meta name="twitter:image" content="https://butilkka.site/og-image.png" />

    <title>버틸까</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
